name: Build and upload release assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload assets for; v0.1.0-alpha/v0.1.0 require explicit release-owner approval
        required: true
        default: v0.1.0-alpha
      confirm_overwrite_assets:
        description: Type true only after approving that existing assets for this tag may be overwritten
        required: true
        default: 'false'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            cgo: '1'
          - goos: windows
            goarch: arm64
            runner: windows-latest
            cgo: '1'
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cgo: '1'
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cgo: '1'
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: '0'
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cgo: '0'

    steps:
      - name: Release boundary preflight
        shell: bash
        run: |
          tag='${{ inputs.tag || github.ref_name }}'
          if [ "$tag" != "v0.1.0-alpha" ] && [ "$tag" != "v0.1.0" ]; then
            echo "::error::This release workflow must run with tag v0.1.0-alpha or v0.1.0; got '$tag'."
            exit 1
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.confirm_overwrite_assets }}" != "true" ]; then
            echo "::error::Manual dispatch requires confirm_overwrite_assets=true because upload uses overwrite_files=true."
            exit 1
          fi
          echo "::notice::Release boundary accepted for ${tag}; upload step uses overwrite_files=true."

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        shell: bash
        run: |
          cd web
          npm ci || npm install
          npm run build

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p dist/cmd
          cp cmd/chat_worker.py dist/cmd/chat_worker.py
          tag='${{ inputs.tag || github.ref_name }}'
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X genericagent-admin-go/internal/version.Version=${tag} -X genericagent-admin-go/internal/version.Commit=${COMMIT} -X genericagent-admin-go/internal/version.Date=${BUILD_DATE}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -ldflags="$LDFLAGS -H=windowsgui" -o dist/ga-admin.exe .
          else
            go build -ldflags="$LDFLAGS" -o dist/ga-admin .
          fi

      - name: Package
        shell: bash
        run: |
          tag='${{ inputs.tag || github.ref_name }}'
          version="${tag#v}"
          name="ga-admin-${tag}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p package "$name"
          cp -R dist/* "$name"/
          cat > "$name/README.txt" <<EOF
          GenericAgent Admin Go ${tag}

          Run ga-admin.exe on Windows, or ga-admin on macOS/Linux.
          Linux servers without DISPLAY/Wayland enter headless mode automatically; use --headless or GA_ADMIN_HEADLESS=1 to force it.
          The executable embeds the React/Vite web UI.
          GenericAgent services still require your local GenericAgent Python environment.
          EOF
          if [ "${{ matrix.goos }}" = "windows" ]; then
            powershell -NoProfile -Command "Compress-Archive -Path '$name/*' -DestinationPath 'package/$name.zip' -Force"
          else
            zip -r "package/$name.zip" "$name"
          fi
          cd package
          python -c "import hashlib, pathlib; [p.with_suffix(p.suffix + '.sha256').write_text(hashlib.sha256(p.read_bytes()).hexdigest() + '  ' + p.name + '\\n', encoding='utf-8') for p in pathlib.Path('.').glob('*.zip')]"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
          files: |
            package/*.zip
            package/*.sha256
          fail_on_unmatched_files: true
          overwrite_files: true
